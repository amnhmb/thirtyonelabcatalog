            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a; 
            color: #f8fafc;
            padding: 50px 20px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px; 
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .header-logo {
            width: 50px; 
            height: auto;
            margin-right: 15px; 
            border-top-left-radius: 12px;    
            border-bottom-left-radius: 12px; 
            border-top-right-radius: 0px;
            border-bottom-right-radius: 0px;
            overflow: hidden;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #FF6B00 0%, #FF0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        .header p {
            font-size: 1rem;
            color: #d1d5db; 
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
        }

        .store-info {
            margin-top: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .store-socials {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .store-socials a {
            color: #f8fafc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px; 
        }

        .icon-img {
            height: 1.8em; 
            width: auto;   
            object-fit: contain;
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .store-socials a:hover {
            color: #FF6B00;
        }
        
        .store-socials a:hover .icon-img {
            transform: scale(1.9); 
        }

        .store-contact {
            font-size: 0.9rem;
            color: #d1d5db;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        .store-contact span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .store-address {
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.4;
            margin-top: 5px;
            border-top: 1px solid #333;
            padding-top: 12px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-address a {
            color: #9ca3af;            
            text-decoration: none;     
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;                  
        }

        .store-address a:hover {
            color: #FF6B00;
        }
        
        .store-address a:hover .icon-img {
            transform: scale(1.9); 
        }

        .edition-buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .edition-btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .edition-btn.primary {
            background: #262626;
            color: #a3a3a3;
            border-color: #404040;
        }

        .edition-btn.world-cup {
            background: #262626;
            color: #a3a3a3;
            border-color: #404040;
        }

        .edition-btn.primary.active {
            background: linear-gradient(135deg, #FF6B00 0%, #FF0000 100%);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.4);
        }

        .edition-btn.world-cup.active {
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%); 
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .edition-btn:hover {
            transform: translateY(-2px);
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px; 
            padding: 10px 0;
        }

        .product-card {
            background: #262626; 
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            border: 2px solid #333; 
            display: none; 
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border-color: #FF6B00; 
        }

        .product-card.prod-wc:hover {
            border-color: #d4af37;
        }

        .image-container {
            position: relative;
            background: #111111; 
            width: 100%;
            padding-top: 125%; 
            overflow: hidden;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease 0.3s; 
        }

        .image-container .img-back {
            opacity: 0; 
        }

        /* PERUBAHAN DI SINI: Auto-slide/hover hanya berfungsi jika kad TIDAK mempunyai kelas 'no-slide' */
        .product-card.prod-wc:not(.no-slide):hover .image-container .img-front {
            opacity: 0;
        }
        .product-card.prod-wc:not(.no-slide):hover .image-container .img-back {
            opacity: 1;
        }

        .badge-new {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF6B00; 
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 10; 
            font-family: Arial, sans-serif;
        }

        .badge-wc {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #d4af37; 
            color: #1a1a1a;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 10; 
            font-family: Arial, sans-serif;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: auto;        
            padding-top: 60px;       
            padding-bottom: 20px;    
            width: 100%;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border-radius: 50px; 
            border: 2px solid #333;
            background: #262626;
            color: #f8fafc;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;

            align-items: center;
            justify-content: center;
        }

        .page-btn:hover {
            border-color: #FF6B00;
            color: #FF6B00;
            transform: scale(1.05);
        }

        .page-btn.active {
            background: linear-gradient(135deg, #FF6B00 0%, #FF0000 100%);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(255, 107, 0, 0.4);
        }

        /* LIGHTBOX OVERLAY */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
        }

        .lightbox-close {
            position: absolute;
            top: -25px;
            right: -25px;
            width: 45px;
            height: 45px;
            background: #FF6B00;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2010;
        }

        .lightbox-close:hover {
            background: #FF0000;
            transform: scale(1.1);
        }

        /* REKA BENTUK MODEN BARU UNTUK BUTANG NAVIGASI KURSOR LIGHTBOX */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08); /* Efek lutsinar */
            backdrop-filter: blur(10px); /* Efek Glassmorphism */
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: none; 
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2005;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Rekabentuk simbol anak panah dalaman menggunakan SVG berciri moden */
        .lightbox-nav svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .lightbox-nav:hover {
            background: #FF6B00;
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.6);
        }

        .lightbox-nav.prev { left: 40px; }
        .lightbox-nav.next { right: 40px; }

        .lightbox-nav.prev:hover svg { transform: translateX(-2px); }
        .lightbox-nav.next:hover svg { transform: translateX(2px); }

        body.no-scroll {
            overflow: hidden;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 1024px) {
            .catalog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .lightbox-nav.prev { left: 25px; }
            .lightbox-nav.next { right: 25px; }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .header-logo { width: 40px; margin-right: 10px; }
            body { padding: 30px 15px; }
            .catalog-grid { grid-template-columns: repeat(1, 1fr); gap: 20px; }
            .lightbox-close { top: -55px; right: 0px; }
            .lightbox-nav { width: 48px; height: 48px; }
            .lightbox-nav.prev { left: 15px; }
            .lightbox-nav.next { right: 15px; }
            .lightbox-nav svg { width: 20px; height: 20px; }
            .lightbox-content { max-width: 95%; }
        }
    </style>
</head>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Previous Image">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">×</button>
            <img src="" alt="Preview Gambar Baju" id="lightboxImg">
        </div>
        <button class="lightbox-nav next" id="lightboxNext" aria-label="Next Image">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <script>
        const cardsPerPage = 16;
        const catalogGrid = document.getElementById('catalogGrid');
        
        const allCards2026 = Array.from(catalogGrid.getElementsByClassName('prod-2026'));
        const allCardsWC = Array.from(catalogGrid.getElementsByClassName('prod-wc'));
        
        let currentEdition = '2026';
        let currentCards = allCards2026; 
        let currentPage = 1;

        let lightboxImagesArray = [];
        let currentLightboxIndex = 0;

        function displayPage(page) {
            currentPage = page;
            const start = (page - 1) * cardsPerPage;
            const end = start + cardsPerPage;

            Array.from(catalogGrid.getElementsByClassName('product-card')).forEach(card => {
                card.style.display = 'none';
            });

            currentCards.forEach((card, index) => {
                if (index >= start && index < end) {
                    card.style.display = 'block'; 
                }
            });

            setupPaginationButtons();
        }

        function setupPaginationButtons() {
            const paginationContainer = document.getElementById('paginationContainer');
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(currentCards.length / cardsPerPage);

            if (totalPages <= 1) return; 

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.innerText = i;
                button.classList.add('page-btn');
                
                if (i === currentPage) {
                    button.classList.add('active');
                }

                button.addEventListener('click', () => {
                    displayPage(i);
                    window.scrollTo({
                        top: catalogGrid.offsetTop - 100,
                        behavior: 'smooth'
                    });
                });

                paginationContainer.appendChild(button);
            }
        }

        function switchEdition(edition) {
            if (currentEdition === edition) return;
            
            currentEdition = edition;
            const btn2026 = document.getElementById('btn2026');
            const btnWC = document.getElementById('btnWC');

            if (edition === '2026') {
                currentCards = allCards2026;
                btn2026.classList.add('active');
                btnWC.classList.remove('active');
            } else {
                currentCards = allCardsWC;
                btnWC.classList.add('active');
                btn2026.classList.remove('active');
            }

            displayPage(1); 
        }

        // ====== LOGIK LIGHTBOX POP-UP KEMAS KINI ======
        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxPrev = document.getElementById('lightboxPrev');
        const lightboxNext = document.getElementById('lightboxNext');

        catalogGrid.addEventListener('click', (e) => {
            const card = e.target.closest('.product-card');
            if (card) {
                const imgs = Array.from(card.querySelectorAll('.image-container img'));
                lightboxImagesArray = imgs.map(img => img.src);
                
                let imgBack = card.querySelector('.img-back');
                let initialSrc = imgs[0].src; 

                if (imgBack && window.getComputedStyle(imgBack).opacity === "1") {
                    initialSrc = imgBack.src; 
                }

                currentLightboxIndex = lightboxImagesArray.indexOf(initialSrc);
                if(currentLightboxIndex === -1) currentLightboxIndex = 0;

                updateLightboxImage();
                
                if (lightboxImagesArray.length > 1) {
                    lightboxPrev.style.display = 'flex';
                    lightboxNext.style.display = 'flex';
                } else {
                    lightboxPrev.style.display = 'none';
                    lightboxNext.style.display = 'none';
                }

                lightboxOverlay.classList.add('active'); 
                document.body.classList.add('no-scroll'); 
            }
        });

        function updateLightboxImage() {
            if (lightboxImagesArray.length > 0) {
                lightboxImg.src = lightboxImagesArray[currentLightboxIndex];
            }
        }

        lightboxNext.addEventListener('click', (e) => {
            e.stopPropagation();
            if (lightboxImagesArray.length > 1) {
                currentLightboxIndex = (currentLightboxIndex + 1) % lightboxImagesArray.length;
                updateLightboxImage();
            }
        });

        lightboxPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            if (lightboxImagesArray.length > 1) {
                currentLightboxIndex = (currentLightboxIndex - 1 + lightboxImagesArray.length) % lightboxImagesArray.length;
                updateLightboxImage();
            }
        });

        lightboxClose.addEventListener('click', (e) => {
            e.stopPropagation(); 
            closeLightbox();
        });

        lightboxOverlay.addEventListener('click', (e) => {
            if (e.target === lightboxOverlay) {
                closeLightbox();
            }
        });

        function closeLightbox() {
            lightboxOverlay.classList.remove('active');
            document.body.classList.remove('no-scroll');
            lightboxImg.src = ""; 
            lightboxImagesArray = [];
        }

        displayPage(1);
    </script>
